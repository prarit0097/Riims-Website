# ============================================================================
# RIIMS — nginx site config for riimshospitals.com (STATIC site)
# ----------------------------------------------------------------------------
# SAFE TO ADD on a shared VPS: this is a NEW, isolated server block. It does
# NOT touch your other apps. Install steps are in deploy/DEPLOY.md.
#
#   root = the repo's generated /site folder (git pull updates it)
#   Handles 1000+ concurrent easily: HTTP/2 + gzip + long cache for static.
# ----------------------------------------------------------------------------
# 1) Put this file at: /etc/nginx/sites-available/riimshospitals
# 2) Edit the two paths marked  << EDIT >>  (root + TLS certs)
# 3) ln -s /etc/nginx/sites-available/riimshospitals /etc/nginx/sites-enabled/
# 4) sudo nginx -t      <-- MUST pass before reload (protects the other sites)
# 5) sudo systemctl reload nginx
# ============================================================================

# ---- HTTP -> HTTPS, and www -> non-www (canonical = https://riimshospitals.com)
server {
    listen 80;
    listen [::]:80;
    server_name riimshospitals.com www.riimshospitals.com;
    return 301 https://riimshospitals.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.riimshospitals.com;

    # << EDIT >> same certs as below (Let's Encrypt usually covers both names)
    ssl_certificate     /etc/letsencrypt/live/riimshospitals.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/riimshospitals.com/privkey.pem;

    return 301 https://riimshospitals.com$request_uri;
}

# ---- Main HTTPS server (canonical host) ------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name riimshospitals.com;

    # << EDIT >> path to the generated site (the repo's /site folder)
    root /var/www/riimshospitals/site;
    index index.html;

    # << EDIT >> TLS certificates (Let's Encrypt / certbot)
    ssl_certificate     /etc/letsencrypt/live/riimshospitals.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/riimshospitals.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # ---- Static throughput (cheap per-request; serves from page cache) ----
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    open_file_cache max=2000 inactive=60s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # ---- Compression (text only; images/woff2 are already compressed) ----
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/xml application/manifest+json;
    # If ngx_brotli is available on your build, uncomment:
    # brotli on;
    # brotli_comp_level 5;
    # brotli_types text/plain text/css application/javascript application/json
    #              image/svg+xml application/xml application/manifest+json;

    # ---- Security headers ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    # Enable HSTS only AFTER HTTPS is confirmed working:
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # CSP — allows self-hosted Lucide, Google Fonts, the Google Maps embed, and
    # WhatsApp form-action. inline styles are required (style-src 'unsafe-inline').
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; frame-src https://www.google.com; form-action 'self' https://wa.me; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self'; connect-src 'self'; upgrade-insecure-requests" always;

    # ---- Caching: use only `expires` (it sets Cache-Control). Do NOT add an
    #      add_header in these locations — that would drop the server-level
    #      security headers (CSP/HSTS) from those responses. ----
    location /assets/ { expires 30d; access_log off; try_files $uri =404; }
    location ~* \.(?:css|js|woff2|woff|ttf|svg|ico|webp|avif|png|jpe?g|gif)$ { expires 30d; access_log off; }
    location ~* \.html$ { expires 1h; }
    location = /sitemap.xml { expires 1d; }
    location = /robots.txt  { expires 1d; }
    location = /site.webmanifest { default_type application/manifest+json; expires 7d; }

    # ---- Clean URLs + 404 ----
    location / {
        try_files $uri $uri/ $uri.html =404;
    }
    error_page 404 /404.html;
}
