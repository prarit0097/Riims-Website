# ============================================================================
# RIIMS — bootstrap server block for the EXISTING host nginx (the one already
# on :80/:443 serving your other apps). HTTP-only on purpose: run certbot after
# installing this and it will add the SSL (443) block + http->https redirect
# automatically, editing ONLY this site (your other server blocks are untouched).
#
# Install (paths/dir confirmed by the diagnostic in DEPLOY.md §A):
#   sudo cp deploy/nginx-riims-bootstrap.conf /etc/nginx/sites-available/riimshospitals
#   sudo ln -s /etc/nginx/sites-available/riimshospitals /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx     # nginx -t MUST pass first
#   sudo certbot --nginx -d riimshospitals.com -d www.riimshospitals.com
# ============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name riimshospitals.com www.riimshospitals.com;

    # Canonical host = apex. Without this, www serves the full site as a 200 and
    # Google sees every page twice (the canonical tag mitigates, a 301 settles it).
    # certbot-safe: an `if` + `return` stays inside the block certbot upgrades to
    # 443, so https://www -> https://apex keeps working after the SSL rewrite.
    if ($host = www.riimshospitals.com) { return 301 https://riimshospitals.com$request_uri; }

    # Repo's generated site folder (git clone into /opt/riims)
    root /opt/riims/site;
    index index.html;

    # Compression (text only)
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/xml application/manifest+json;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; frame-src https://www.google.com; form-action 'self' https://wa.me; img-src 'self' data: https://*.google-analytics.com https://*.googletagmanager.com; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' https://www.googletagmanager.com; connect-src 'self' https://*.google-analytics.com https://*.analytics.google.com https://*.googletagmanager.com https://stats.g.doubleclick.net; upgrade-insecure-requests" always;

    # Caching — use only `expires` (it sets Cache-Control). Do NOT add another
    # add_header here: a location with add_header drops the server-level security
    # headers above, which would strip CSP/HSTS from the page.
    location /assets/ { expires 30d; access_log off; }
    location ~* \.(?:css|js|woff2|woff|ttf|svg|ico|webp|avif|png|jpe?g|gif)$ { expires 30d; access_log off; }
    location ~* \.html$ { expires 1h; }
    location = /sitemap.xml { expires 1d; }
    location = /robots.txt  { expires 1d; }
    location = /llms.txt    { expires 1d; }
    location = /site.webmanifest { default_type application/manifest+json; expires 7d; }

    # 301 redirects — condition pages renamed for SEO (old URL -> new keyword URL).
    # Exact-match locations win over the .html caching + generic location / below.
    location = /conditions/diabetes-bp.html { return 301 /conditions/diabetic-kidney-disease.html; }
    location = /conditions/stone-uti.html   { return 301 /conditions/kidney-stone-treatment.html; }
    location = /conditions/swelling.html     { return 301 /conditions/kidney-swelling-treatment.html; }

    # Ghosts of the domain's previous life (a GoDaddy site-builder shop) that crawlers
    # still request — Semrush found them indexed. Send them somewhere real instead of 404.
    location = /privacy-policy        { return 301 /privacy.html; }
    location = /terms-and-conditions  { return 301 /terms.html; }
    location = /shop                  { return 301 /; }
    location ^~ /ols/                 { return 301 /; }

    # Admin panel + lead API -> local admin server (docker riims-admin :5500).
    # ^~ wins over the regex caching locations above.
    location ^~ /admin/ {
        proxy_pass http://127.0.0.1:5500;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 10m;
    }
    location = /admin { return 301 /admin/; }
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:5500;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 10m;
    }

    # Clean URLs + branded 404
    location / { try_files $uri $uri.html $uri/ =404; }
    error_page 404 /404.html;
}
