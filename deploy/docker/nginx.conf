# RIIMS static site — nginx config INSIDE the container (Traefik terminates TLS).
# Mounted to /etc/nginx/conf.d/default.conf. Serves /usr/share/nginx/html (the repo's site/).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static throughput
    sendfile on;
    tcp_nopush on;

    # Compression (text only; images/woff2 already compressed)
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/xml application/manifest+json;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; frame-src https://www.google.com; form-action 'self' https://wa.me; img-src 'self' data: https://*.google-analytics.com https://*.googletagmanager.com; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' https://www.googletagmanager.com; connect-src 'self' https://*.google-analytics.com https://*.analytics.google.com https://*.googletagmanager.com https://stats.g.doubleclick.net; upgrade-insecure-requests" always;

    # Caching — use only `expires` (sets Cache-Control). Adding add_header in a
    # location would drop the server-level security headers from that response.
    location /assets/ { expires 30d; access_log off; }
    location ~* \.(?:css|js|woff2|woff|ttf|svg|ico|webp|avif|png|jpe?g|gif)$ { expires 30d; access_log off; }
    location ~* \.html$ { expires 1h; }
    location = /sitemap.xml { expires 1d; }
    location = /robots.txt  { expires 1d; }
    location = /site.webmanifest { default_type application/manifest+json; expires 7d; }

    # Clean URLs + branded 404
    location / { try_files $uri $uri.html $uri/ =404; }
    error_page 404 /404.html;
}
