# ============================================================================
# RIIMS — Apache VirtualHost for riimshospitals.com (STATIC site)
# Use this ONLY if your VPS serves sites with Apache instead of nginx.
# SAFE on a shared VPS: a NEW vhost; does not touch other sites.
#
# 1) Put at: /etc/apache2/sites-available/riimshospitals.conf
# 2) Edit DocumentRoot + SSL cert paths (<< EDIT >>)
# 3) sudo a2enmod headers rewrite expires deflate ssl
# 4) sudo a2ensite riimshospitals
# 5) sudo apachectl configtest      <-- MUST pass before reload
# 6) sudo systemctl reload apache2
# (Mods + the .htaccess in the site root handle gzip/caching/headers/404.)
# ============================================================================

<VirtualHost *:80>
    ServerName riimshospitals.com
    ServerAlias www.riimshospitals.com
    Redirect permanent / https://riimshospitals.com/
</VirtualHost>

<VirtualHost *:443>
    ServerName www.riimshospitals.com
    SSLEngine on
    # << EDIT >> cert paths
    SSLCertificateFile      /etc/letsencrypt/live/riimshospitals.com/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/riimshospitals.com/privkey.pem
    Redirect permanent / https://riimshospitals.com/
</VirtualHost>

<VirtualHost *:443>
    ServerName riimshospitals.com

    # << EDIT >> path to the generated site (the repo's /site folder)
    DocumentRoot /var/www/riimshospitals/site

    SSLEngine on
    # << EDIT >> cert paths
    SSLCertificateFile      /etc/letsencrypt/live/riimshospitals.com/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/riimshospitals.com/privkey.pem

    <Directory /var/www/riimshospitals/site>
        Options -Indexes +FollowSymLinks
        AllowOverride All          # lets the bundled .htaccess apply
        Require all granted
    </Directory>

    ErrorDocument 404 /404.html
</VirtualHost>
